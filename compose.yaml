name: safe-${SAFE_STACK_NAME:-stack}

services:
  web:
    container_name: safe-${SAFE_STACK_NAME:-stack}-web
    build:
      context: .
      dockerfile: docker/web/Dockerfile.dev
    command: ["sh", "-lc", "CI=1 pnpm install --frozen-lockfile --force && pnpm --filter @safe/web start"]
    working_dir: /workspace
    environment:
      SAFE_WEB_PORT: 3000
      SAFE_WEB_DATA_DIR: /workspace/.cache/safe-web-data
      SAFE_CONTROL_PLANE_URL: http://control-plane:8080
      SAFE_OAUTH_DEV_MODE: ${SAFE_OAUTH_DEV_MODE:-true}
      SAFE_OAUTH_PROVIDER: ${SAFE_OAUTH_PROVIDER:-Google}
      SAFE_OAUTH_CLIENT_ID: ${SAFE_OAUTH_CLIENT_ID:-}
      SAFE_OAUTH_CLIENT_SECRET: ${SAFE_OAUTH_CLIENT_SECRET:-}
      SAFE_OAUTH_REDIRECT_URL: ${SAFE_OAUTH_REDIRECT_URL:-http://localhost:3000/auth/callback}
      SAFE_OAUTH_AUTHORIZE_URL: ${SAFE_OAUTH_AUTHORIZE_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      SAFE_OAUTH_TOKEN_URL: ${SAFE_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      SAFE_OAUTH_ACCESS_TOKEN: ${SAFE_OAUTH_ACCESS_TOKEN:-}
      SAFE_OAUTH_ACCOUNT_ID: ${SAFE_OAUTH_ACCOUNT_ID:-acct-dev-001}
      SAFE_DEVICE_ID: ${SAFE_DEVICE_ID:-dev-web-001}
      SAFE_ENV: development
    ports:
      - "${SAFE_WEB_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
    depends_on:
      control-plane:
        condition: service_started

  control-plane:
    container_name: safe-${SAFE_STACK_NAME:-stack}-control-plane
    build:
      context: .
      dockerfile: docker/control-plane/Dockerfile.dev
    command: ["go", "run", "./cmd/control-plane"]
    working_dir: /workspace
    environment:
      GOCACHE: /tmp/go-build
      SAFE_ENV: development
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SAFE_S3_BUCKET: ${SAFE_S3_BUCKET:-safe-dev}
      SAFE_S3_ENDPOINT: http://localstack:4566
      SAFE_OAUTH_DEV_MODE: ${SAFE_OAUTH_DEV_MODE:-true}
      SAFE_OAUTH_CLIENT_ID: ${SAFE_OAUTH_CLIENT_ID:-}
      SAFE_OAUTH_JWKS_URL: ${SAFE_OAUTH_JWKS_URL:-https://www.googleapis.com/oauth2/v3/certs}
      SAFE_OAUTH_ISSUER: ${SAFE_OAUTH_ISSUER:-https://auth.safe.local}
      SAFE_OAUTH_AUDIENCE: ${SAFE_OAUTH_AUDIENCE:-safe-control-plane}
      SAFE_OAUTH_HS256_SECRET: ${SAFE_OAUTH_HS256_SECRET:-0123456789abcdef0123456789abcdef}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    ports:
      - "${CONTROL_PLANE_PORT:-8080}:8080"
    volumes:
      - .:/workspace
    depends_on:
      localstack:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./cmd
          target: /workspace/cmd
        - action: sync+restart
          path: ./internal
          target: /workspace/internal
        - action: sync+restart
          path: ./go.mod
          target: /workspace/go.mod
        - action: sync+restart
          path: ./go.work
          target: /workspace/go.work

  localstack:
    container_name: safe-${SAFE_STACK_NAME:-stack}-localstack
    image: localstack/localstack:4.4.0
    environment:
      SERVICES: s3,sts
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
      PERSISTENCE: 1
      EAGER_SERVICE_LOADING: 1
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/localstack/init/01-bootstrap.sh:/etc/localstack/init/ready.d/01-bootstrap.sh:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "awslocal s3 ls >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  localstack-data:
    name: safe-${SAFE_STACK_NAME:-stack}-localstack-data
  pnpm-store:
    name: safe-${SAFE_STACK_NAME:-stack}-pnpm-store
